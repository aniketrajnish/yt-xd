<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advanced Physics Thumbnail</title>
    <link rel="icon" type="image/svg+xml" href="./assets/resources/page-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand-copy">
          <h1>  generate thumbnail for
            <a href="https://www.youtube.com/@AdvancedPhysics/videos" target="_blank" rel="noreferrer">
              advanced physics
            </a>
          </h1>
          <p class="brand-subtitle">paste youtube url, generate thumbnail</p>
        </div>
      </header>

      <section class="panel">
        <label for="videoInput">youtube url</label>
        <form id="thumbnailForm" class="controls">
          <input
            id="videoInput"
            type="url"
            inputmode="url"
            autocomplete="off"
            placeholder="https://www.youtube.com/watch?v=..."
            required
          />
          <button id="generateButton" type="submit">generate</button>
          <button id="downloadButton" type="button" disabled>download</button>
        </form>
        <p id="statusText" class="status">ready</p>
      </section>

      <section id="result" class="panel result" hidden>
        <img id="previewImage" class="preview" alt="Rendered thumbnail preview" />
      </section>

      <footer class="footer-note">
        koi dikkat ho ya thumbnail sahi nai lage to call kriega papa
      </footer>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
